name: Test and sync getRyt to Hugging Face

on:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: getryt-huggingface-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

  sync:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Validate Hugging Face deployment configuration
        shell: bash
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
        run: |
          test -n "$HF_TOKEN" || {
            echo "::error::Missing GitHub Actions secret: HF_TOKEN"
            exit 1
          }

          test -n "$HF_SPACE_ID" || {
            echo "::error::Missing GitHub Actions variable: HF_SPACE_ID"
            exit 1
          }

      - uses: actions/checkout@v6

      - name: Sync tested master to Hugging Face Space
        uses: huggingface/hub-sync@v0.2.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: ${{ vars.HF_SPACE_ID }}
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker
          private: false
